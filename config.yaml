# Resume Screener Configuration
# Multi-role support

roles:
  # Role 1: Senior Talent Lead - India
  - job_id: "3460fc9f-f3e6-46c2-b846-1a2fb1017b9a"
    job_title: "Senior Talent Lead, India"
    threshold: 7.0

    criteria:
      - name: "technical_ai_ability"
        label: "Technical & AI Ability"
        weight: "high"
        description: |
          Experience with AI tools like Claude, Cursor, Clay, or any vibe coding/automation tools.
          Bonus for CS or engineering degree.

      - name: "recruiting_experience"
        label: "Recruiting Experience"
        weight: "medium"
        description: |
          At least 1 year in talent sourcing, acquisition, or recruiting operations.
          ATS experience is a plus.

      - name: "startup_vc_background"
        label: "Startup/VC Background"
        weight: "medium"
        description: |
          Experience at startups, venture studios, or VC-backed companies.
          Scrappy, fast-moving environments.

      - name: "builder_mentality"
        label: "Builder Mentality"
        weight: "high"
        description: |
          Evidence they have built systems, automated workflows, or created something from scratch
          rather than just maintaining existing processes.

      - name: "healthcare_venture_experience"
        label: "Healthcare/Venture Experience"
        weight: "low_bonus"
        description: |
          Nice to have but not required. Experience in healthcare, healthtech, or venture capital.

  # Role 2: Executive Assistant & Workplace Operations
  - job_id: "63841c46-29a8-40dc-8184-0c6cf7407ccc"
    job_title: "Executive Assistant & Workplace Operations"
    threshold: 7.0
    nyc_hard_gate: true  # If not in NYC, do not alert regardless of score

    criteria:
      - name: "ea_experience"
        label: "EA or Relevant Experience"
        weight: "high"
        description: |
          Strong preference for executive assistant experience. Chief of Staff, business operations,
          or office management is also relevant. Must have 4+ years total experience.

      - name: "years_experience_fit"
        label: "Years of Experience Fit"
        weight: "high"
        description: |
          Ideal range is 3-11 years of total professional experience.
          Candidates with 15+ years should score very low (2 or below) on this dimension.
          Candidates with less than 2 years should also score low.

      - name: "startup_vc_background"
        label: "Startup/VC Background"
        weight: "high"
        description: |
          Preference for candidates who have worked at startups, venture capital firms, or venture studios.
          Large corporate-only backgrounds are a negative signal.

      - name: "job_stability"
        label: "Job Stability"
        weight: "medium"
        description: |
          Negative signal if the candidate has less than 2 years at most of their roles or shows
          frequent job hopping. Reward candidates with longer tenures, but not beyond 8+ years
          in a single role (may indicate lack of growth).

      - name: "education"
        label: "Education"
        weight: "low_medium"
        description: |
          Preference for candidates who attended a top 100 US university.
          Not a dealbreaker but a positive signal.

      - name: "ai_tech_savvy"
        label: "AI & Technology Savviness"
        weight: "low_medium"
        description: |
          Bonus points for any experience with AI tools, scheduling automation, or demonstrated
          interest in using technology to improve productivity.

  # Role 3: Managing Director of New Ventures
  - job_id: "e484d977-fe6b-47be-8dc2-78b44a2f51fa"
    job_title: "Managing Director of New Ventures"
    threshold: 7.5
    founder_boost: 0.05  # 5% boost to final score if candidate is a former founder

    criteria:
      - name: "venture_experience"
        label: "Venture Experience"
        weight: "very_high"
        description: |
          Use a tiered scoring system:
          - Tier 1 (score 8-10): Top-tier global VC firms: Sequoia, Accel, a16z, Benchmark, Insight,
            NEA, General Catalyst, Flare, or equivalent
          - Tier 2 (score 6-8): Healthcare-specific VC or strong tier 2 firms: 7wire, Aegis,
            Echo Health, Frist Cressey, Health X, or equivalent
          - Tier 3 (score 4-6): General consulting, banking, or private equity: Big 4 consulting,
            internal consulting at large corporations, business analyst roles
          - Negative signal (score below 4): No venture experience, only corporate strategy roles
            without external firm experience, academic or research-only background

          IMPORTANT: Candidate must be in an investing-focused role. If their background is in a
          non-investing function like talent, marketing, or operations, score below 4 regardless
          of firm prestige.

          Include "venture_tier": "Tier 1", "Tier 2", "Tier 3", or "None" in your response.

      - name: "career_trajectory"
        label: "Career Trajectory"
        weight: "high"
        description: |
          Evaluate upward mobility and progression:
          - Positive signals: Rapid advancement and progressive responsibility
            (e.g., Associate → VP → Principal → Vice President → Director → Managing Director),
            at least one promotion at the same company, transitions showing intentionality
            and learning velocity
          - Negative signals: Lateral moves without upward momentum, career stagnation,
            long stints at large companies for 5+ years, being in the same role for 4+ years

          Include "career_trajectory_summary": "<one sentence summary>" in your response.

      - name: "educational_background"
        label: "Educational Background"
        weight: "medium"
        description: |
          Use a tiered scoring system:
          - Tier 1 (score 8.5-10): Global elite undergraduate: Ivy League, Stanford, MIT, Caltech,
            Oxford, Cambridge, LSE, or Indian elite (IITs, IIM A/B/C, BITS Pilani, Delhi University
            St. Stephen's, Hindu College). OR elite graduate: MBA at Harvard, Stanford, Wharton,
            Kellogg, Booth, MIT Sloan, INSEAD, IIM A/B/C; PhD at top research universities;
            MD at prestigious medical schools
          - Tier 2 (score 6.5-8.4): Strong undergraduate (US Top 30, UC Berkeley, Michigan, Virginia)
            or good graduate programs (MBA top 20, strong regional programs, Master's from
            reputable institutions)
          - Tier 3 (score 4-6.4): Regional or local universities with decent reputation,
            recognized private institutions, strong performance despite lesser-known institution
          - Negative signals (score below 4): Unaccredited or questionable institutions,
            unexplained incomplete degrees, misrepresentation, certificates or extension programs only

      - name: "healthcare_experience"
        label: "Healthcare Experience"
        weight: "high"
        description: |
          Look for deep knowledge across care delivery, health tech, or healthcare services.
          Ability to develop original investment theses in healthcare.
          Penalize candidates with no healthcare exposure.

      - name: "ai_technology_fluency"
        label: "AI & Technology Fluency"
        weight: "medium"
        description: |
          Evidence of sophisticated AI tool usage beyond basic LLM prompting.
          Has built systems or workflows using AI.
          Treats AI as a core part of their analytical process.

          Also check if the candidate is a former founder or co-founder of a startup.
          Include "is_founder": true/false in your response.

weight_values:
  very_high: 4
  critical: 5
  high: 3
  medium: 2
  low_medium: 1.5
  low: 1
  low_bonus: 1

ashby:
  base_url: "https://app.ashbyhq.com"
  profile_url_template: "https://app.ashbyhq.com/candidate-searches/new/right-side/candidates/{candidate_id}"

polling:
  interval_minutes: 60
  lookback_hours: 1
